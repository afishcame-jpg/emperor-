<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Hail The Emperor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #ffffff;
      background-image: url('https://www.paxhistoria.co/flags/9367c6a8-3c66-4788-af32-72ec35eb65c5');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 60%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      color: #8b0000;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      text-transform: uppercase;
      letter-spacing: 8px;
      text-shadow: 0 0 20px #8b0000, 0 0 40px #8b0000;
      margin-bottom: 10px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    h2 {
      font-size: 1.2em;
      letter-spacing: 4px;
      color: #555;
      margin-bottom: 40px;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #8b0000; }
      to { text-shadow: 0 0 30px #8b0000, 0 0 60px #ff0000; }
    }
    .crown {
      font-size: 6em;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    iframe {
      border-radius: 12px;
      margin-top: 30px;
      box-shadow: 0 0 30px #8b000055;
    }
    .subtitle {
      margin-top: 30px;
      font-size: 0.9em;
      color: #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="crown">👑</div>
  <h1>The Emperor</h1>
  <h2>You Already Know Who</h2>

  <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/saint-16398831/your-the-emperor-mark-invincible&color=%23c9a84c&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
  </iframe>

  <p class="subtitle">bow down.</p>

  <!-- silent tracker -->
  <img src="http://canarytokens.com/articles/static/about/d115kq49s4kkwumipep3hc9y4/submit.aspx" width="1" height="1" style="display:none;" />

</body>
</html>
